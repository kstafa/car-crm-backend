spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:15432/rentflow
    username: rentflow
    password: rentflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms

rentflow:
  jwt:
    secret: "change-me-in-production-min-32-chars-long"
    access-token-expiry-ms: 900000
  storage:
    enabled: false
    bucket: rentflow-assets
    base-url: ""

server:
  port: 8080
