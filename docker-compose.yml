services:
  postgres:
    image: postgres:16
    container_name: rentflow-postgres
    environment:
      POSTGRES_DB: rentflow
      POSTGRES_USER: rentflow
      POSTGRES_PASSWORD: rentflow
    ports:
      - "15432:5432"
    volumes:
      - rentflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentflow -d rentflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rentflow-postgres-data:
    name: rentflow-postgres-data
